task: waymo_full_exp_origin
# source_path: ./data/waymo/training/021
# source_path: /home/zyk/Projects/_DL/_Reconstruction/drivestudio/data/waymo/processed/training/021
source_path: /home/zyk/Projects/_DL/_Reconstruction/drivestudio/data/nuscenes/processed_10Hz/mini/000
exp_name: 0622_ds_nuscenes00

data:
  type: DriveStudio
  white_background: false
  # split_test: -1
  # split_train: 1
  # selected_frames: [0, 190] # 0, 198
  # cameras: [0, 1, 2, 3, 4, 5]
  split_test: 4
  split_train: -1
  selected_frames: [0, 60] # 0, 198
  cameras: [0, 1, 2, 3, 4]

  extent: 10
  use_colmap: true
  filter_colmap: true
  box_scale: 1.5
  shuffle: false

model:
  gaussian:
    sh_degree: 1
    fourier_dim: 5
    fourier_scale: 1.
    flip_prob: 0.
  nsg:
    include_bkgd: true
    include_obj: true
    include_sky: true
    opt_track: true

    flatten_loss: true


train:
  iterations: 30000
  test_iterations: [8000, 16000, 30000]
  save_iterations: [30000]
  checkpoint_iterations: [4000, 8000, 16000, 24000, 30000]

optim:

  error_tolerance: 0.01

  prune_box_interval: 100
  densification_interval: 100
  
  prop_voxel_interval: 5

  densify_from_iter: 500
  densify_grad_threshold_bkgd: 0.001 #0.0006
  densify_grad_abs_bkgd: True
  densify_grad_threshold_obj: 0.0002 #0.0002
  densify_grad_abs_obj: False
  densify_until_iter: 24000

########## visibility
  hard_depth_start: 0
  hard_depth_end: 24000
  propagated_iteration_begin: 0 # 1000
  propagated_iteration_end: 24000
  propagation_interval: 5
  lambda_shape_pena: 0
  lambda_scale_pena: 0

  feature_lr: 0.0025
  max_screen_size: 20
  min_opacity: 0.01
  opacity_lr: 0.05
  opacity_reset_interval: 3000
  percent_big_ws: 0.1
  percent_dense: 0.01
  position_lr_delay_mult: 0.01
  position_lr_final: 1.6e-06
  position_lr_init: 1.6e-05 # 0.00016
  position_lr_max_steps: 50000
  rotation_lr: 0.001
  scaling_lr: 0.005
  semantic_lr: 0.01

  lambda_dssim: 0.2
  lambda_sky: 0.05
  lambda_mask: 0.1
  lambda_reg: 0.1
  lambda_depth_lidar: 0.1

  track_position_lr_delay_mult: 0.01
  track_position_lr_init: 0.005
  track_position_lr_final: 5.0e-5
  track_position_max_steps: 30000

  track_rotation_lr_delay_mult: 0.01
  track_rotation_lr_init: 0.001
  track_rotation_lr_final: 1.0e-5
  track_rotation_max_steps: 30000

  # voxel DN vision
  normal_loss: True
  use_voxel_depth: True
  
  # origin lidar depth supervision
  use_lidar_depth: False

  # view selection
  skip_view_selection: False

  
render:
  fps: 24
  concat_cameras: [1, 0, 2]
  render_normal: True